[build]
  command = "npm run build"
  publish = ".next"

# Secrets scanning : ces variables sont utilisées UNIQUEMENT côté serveur
# (API routes, server components, Netlify Functions). Aucune n'est préfixée
# NEXT_PUBLIC_, donc Next.js ne les inline jamais dans le bundle navigateur
# (vérifié : rien de sensible dans .next/static). Le scanner Netlify les
# détecte quand même dans les artefacts serveur (function bundles générés par
# @netlify/plugin-nextjs + source maps) : faux positif. On les exclut du scan.
# Ne JAMAIS ajouter ici une variable NEXT_PUBLIC_* (elle est réellement
# exposée au client, le scan doit rester actif dessus).
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "ANTHROPIC_API_KEY,APOLLO_API_KEY,TAVILY_API_KEY,HUBSPOT_ACCESS_TOKEN,HUBSPOT_CLIENT_SECRET,HUBSPOT_WEBHOOK_TARGET_URL,SLACK_BOT_TOKEN,SLACK_USER_TOKEN,SLACK_SIGNING_SECRET,SLACK_NEW_MEETINGS_CHANNEL,CLERK_SECRET_KEY,ENCRYPTION_SECRET,INTERNAL_SECRET,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REFRESH_TOKEN,GOOGLE_DRIVE_REFRESH_TOKEN,BRIGHTDATA_API_KEY,BRIGHTDATA_LINKEDIN_DATASET_ID,BRIGHTDATA_SERP_ZONE,CLAAP_API_TOKEN,CLAAP_WEBHOOK_SECRET,HEYGEN_API_KEY,HEYGEN_AVATAR_ID,HEYGEN_AVATAR_TYPE,HEYGEN_VOICE_ID,HEYGEN_VOICE_ID_FR,WORDPRESS_API_URL,WORDPRESS_APP_USER,WORDPRESS_APP_PASSWORD,GA4_PROPERTY_ID,SEARCH_CONSOLE_SITE_URL,CRON_USER_EMAIL,BILLING_DRIVE_FILE_ID,BILLING_SHEET_TAB,AE_REVENUE_DRIVE_FILE_ID,AE_ACTIVITY_START"

[functions]
  directory = "netlify/functions"
